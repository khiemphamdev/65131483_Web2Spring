<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập đơn giản</title>
    <style>
    
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 300px;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            text-align: center;
            color: #333;
        }

        input[type="text"], 
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #555;
        }

        .links {
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
        }

        a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>ĐĂNG NHẬP</h2>
    <form action="Login.jsp" method="POST">
        <input type="text" name="tenDN" placeholder="Tên đăng nhập" required>
        <input type="password" name="mk" placeholder="Mật khẩu" required>
        <button type="submit">Đăng nhập</button>
    </form>
    <div class="links">
        <a href="#">Quên mật khẩu?</a>
    </div>
</div>

</body>
</html>
