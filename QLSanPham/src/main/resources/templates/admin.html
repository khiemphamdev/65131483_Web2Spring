<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Hệ thống - NTU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden-section { display: none; }
        .sidebar { min-width: 250px; height: 100vh; background: #343a40; position: fixed; }
        .main-content { margin-left: 250px; padding: 30px; }
        .nav-link { color: #adb5bd; cursor: pointer; }
        .nav-link.active { color: white; background-color: #495057; font-weight: bold; }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar p-3">
        <h3 class="text-white mb-4">NTU Admin</h3>
        <ul class="nav nav-pills flex-column">
            <li class="nav-item">
                <a id="nav-product" class="nav-link active" onclick="showSection('product-section')">Quản lý Sản phẩm</a>
            </li>
            <li class="nav-item mt-2">
                <a id="nav-category" class="nav-link" onclick="showSection('category-section')">Loại sản phẩm</a>
            </li>
            <li class="nav-item mt-5">
                <a href="#" class="nav-link text-warning">Trang người dùng</a>
            </li>
        </ul>
    </div>

    <div class="main-content w-100">
        
        <div id="product-section">
            <div class="d-flex justify-content-between mb-3">
                <h2>Danh sách Sản phẩm</h2>
                <a href="/admin/product/add" class="btn btn-primary">Thêm sản phẩm</a>
            </div>
            <table class="table table-striped border">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th><th>Tên sản phẩm</th><th>Giá</th><th>Loại</th><th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${dsSanPham}">
                        <td th:text="${p.id}"></td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.price}"></td>
                        <td th:text="${p.category != null ? p.category.name : 'N/A'}"></td>
                        <td>
                            <a th:href="@{/admin/product/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{/admin/product/delete/{id}(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có đồng ý xóa không?')">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="category-section" class="hidden-section">
            <div class="d-flex justify-content-between mb-3">
                <h2>Danh mục Loại sản phẩm</h2>
                <a href="/admin/category/add" class="btn btn-primary">Thêm sản phẩm</a>
                </div>
            <table class="table table-striped border">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th><th>Tên loại</th><th>Mô tả</th><th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${dsLoai}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.name}"></td>
                        <td th:text="${c.description}"></td>
                        <td>
                          <a th:href="@{/admin/category/edit/{id}(id=${c.id})}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{/admin/category/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có đồng ý xóa không?')">Xóa</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script>
    function showSection(sectionId) {
        // Ẩn tất cả các bảng
        document.getElementById('product-section').classList.add('hidden-section');
        document.getElementById('category-section').classList.add('hidden-section');
        
        // Bỏ active ở các menu
        document.getElementById('nav-product').classList.remove('active');
        document.getElementById('nav-category').classList.remove('active');
        
        // Hiện bảng được chọn
        document.getElementById(sectionId).classList.remove('hidden-section');
        
        // Active menu tương ứng
        if(sectionId === 'product-section') {
            document.getElementById('nav-product').classList.add('active');
        } else {
            document.getElementById('nav-category').classList.add('active');
        }
    }
</script>

</body>
</html>
