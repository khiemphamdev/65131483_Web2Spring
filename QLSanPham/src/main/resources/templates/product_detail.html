<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${sp.name} + ' - Chi tiết sản phẩm'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .product-container { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 40px; margin-top: 50px; }
        .img-main { width: 100%; border-radius: 15px; object-fit: cover; max-height: 500px; transition: transform 0.3s; }
        .img-main:hover { transform: scale(1.02); }
        .category-label { color: #6c757d; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; font-weight: 600; }
        .product-title { font-size: 2.5rem; font-weight: 700; color: #212529; margin-bottom: 15px; }
        .price-tag { font-size: 2rem; color: #d63384; font-weight: 700; margin-bottom: 25px; }
        .description-box { line-height: 1.8; color: #495057; background: #fdfdfd; padding: 20px; border-left: 4px solid #dee2e6; border-radius: 4px; }
        .btn-cart { padding: 15px 30px; font-weight: 600; border-radius: 12px; transition: all 0.3s; }
        .btn-cart:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(13,110,253,0.3); }
        .back-link { text-decoration: none; color: #6c757d; transition: 0.2s; }
        .back-link:hover { color: #212529; }
    </style>
</head>
<body>

<div class="container mb-5">
    <div class="mt-4">
        <a href="/products" class="back-link">
            <i class="bi bi-arrow-left me-2"></i>Quay lại danh sách
        </a>
    </div>

    <div class="product-container">
        <div class="row g-5">
            <div class="col-md-6">
                <div class="position-relative">
                    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" 
                         class="img-main shadow-sm" alt="Product Image">
                </div>
            </div>

            <div class="col-md-6">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item"><a href="/products" class="text-decoration-none">Cửa hàng</a></li>
                        <li class="breadcrumb-item active" th:text="${sp.category?.name}">Loại sản phẩm</li>
                    </ol>
                </nav>

                <div class="category-label mb-1" th:text="${sp.category?.name}">CATEGORY</div>
                <h1 class="product-title" th:text="${sp.name}">Tên sản phẩm đầy đủ</h1>
                
                <div class="price-tag">
                    <span th:text="${#numbers.formatDecimal(sp.price, 0, 'COMMA', 0, 'POINT')}"></span> <small>₫</small>
                </div>

                <div class="mb-4">
                    <h5 class="fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>Mô tả sản phẩm</h5>
                    <div class="description-box">
                    
                            Sản phẩm này mang lại trải nghiệm tuyệt vời cho người dùng với chất liệu cao cấp và thiết kế tinh tế. Phù hợp cho mọi đối tượng sử dụng hàng ngày.
                        </p>
                    </div>
                </div>


               
            </div>
        </div>
    </div>
</div>

<footer class="text-center py-5 text-muted">
    <p>© 2026 NTU - Pham Gia Khiem Store</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
