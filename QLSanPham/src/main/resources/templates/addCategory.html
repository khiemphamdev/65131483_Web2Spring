<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Sản Phẩm - NTU Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4 text-primary">THÊM LOẠI SẢN PHẨM MỚI</h2>
        <form th:action="@{/admin/category/save}" th:object="${category}" method="post">
            
            <div class="mb-3">
                <label class="form-label fw-bold">Tên loại sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên sản phẩm..." required>
            </div>       

            <div class="d-flex justify-content-between mt-4">
                <a href="/admin" class="btn btn-outline-secondary px-4">Quay lại</a>
                <button type="submit" class="btn btn-primary px-4">Lưu sản phẩm</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
