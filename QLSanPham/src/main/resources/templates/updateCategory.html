<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh Sửa Sản Phẩm - NTU Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff9f0; }
        .form-container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #ffc107; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4 text-dark">CẬP NHẬT SẢN PHẨM</h2>
        <form th:action="@{/admin/category/save}" th:object="${category}" method="post">
            
            <input type="hidden" th:field="*{id}" />

            <div class="mb-3">
                <label class="form-label fw-bold">Tên loại sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

           
            <div class="d-flex justify-content-between mt-4">
                <a href="/admin" class="btn btn-secondary px-4">Hủy</a>
                <button type="submit" class="btn btn-warning px-4 fw-bold">Cập nhật</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
