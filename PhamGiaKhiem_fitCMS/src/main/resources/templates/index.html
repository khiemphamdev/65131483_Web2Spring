<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    height:100vh;
}

.container{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    border:1px solid black;
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 20px;
    border-bottom:1px solid black;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:50px;
}

.user{
    font-weight:bold;
}

/* Main layout */
.main{
    flex:1;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:220px;
    border-right:1px solid black;
}

.sidebar h3{
    padding:10px;
    background:#eee;
    border-bottom:1px solid black;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:10px;
    border-bottom:1px solid black;
    cursor:pointer;
}

.sidebar li:hover{
    background:#f2f2f2;
}

/* Content */
.content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
}

/* Footer */
.footer{
    text-align:center;
    padding:10px;
    border-top:1px solid black;
}
</style>
<body>


<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="logo">
            <img src="logo.png" alt="logo">
            <span>TRƯỜNG ĐẠI HỌC NHA TRANG <br> KHOA CÔNG NGHỆ THÔNG TIN</span>
        </div>

        <div class="user">
            Phạm Gia Khiêm
        </div>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Sidebar -->
        <div class="sidebar">
            <h3>Dashboard</h3>
            <ul>
                <li>Page - List</li>
                <li>Page - Addnew</li>
                <li>Post - List</li>
                <li>Post - Addnew</li>
            </ul>
        </div>

        <!-- Content -->
        <div class="content">
            Content
        </div>

    </div>

    <!-- Footer -->
    <div class="footer">
        ©2025 by Student Name – FIT.NTU
    </div>

</div>

</body>
</html>
